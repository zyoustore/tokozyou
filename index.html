<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyou Market | Roblox Top Up & Gamepass</title>
    <!-- Tailwind CSS untuk tampilan modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(180deg, #0b132b 0%, #1c2541 100%);
        }
        /* Custom scrollbar untuk daftar produk agar rapi */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #0b132b;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #3a86ff;
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <!-- CONTAINER UTAMA -->
    <div class="w-full max-w-lg bg-slate-900/90 backdrop-blur-md border border-blue-500/30 rounded-2xl p-5 shadow-2xl shadow-blue-900/40 my-4">
        
        <!-- HEADER TOKO -->
        <div class="text-center mb-5">
            <h1 class="text-3xl font-extrabold tracking-wide text-blue-400 drop-shadow-[0_2px_8px_rgba(56,189,248,0.4)]">
                ⚡ ZYOU MARKET
            </h1>
            <p class="text-xs text-blue-300/80 mt-1">Robux via username & Gamepass Drag Drive Simulator Terpercaya</p>
        </div>

        <form id="topupForm" onsubmit="kirimOrder(event)" class="space-y-4">
            
            <!-- STEP 1: INPUT DATA USER (ROBLOX ONLY) -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-blue-300 uppercase tracking-wider mb-1.5">
                        1a. Username Roblox
                    </label>
                    <input 
                        type="text" 
                        id="username"
                        required
                        placeholder="Contoh: ZyouAdmin" 
                        class="w-full px-4 py-3 text-sm rounded-xl bg-slate-950 border border-blue-900 focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20 text-white placeholder-slate-600 outline-none transition-all"
                    />
                </div>
                <div>
                    <label class="block text-xs font-bold text-blue-300 uppercase tracking-wider mb-1.5">
                        1b. Display Name
                    </label>
                    <input 
                        type="text" 
                        id="displayName"
                        required
                        placeholder="Contoh: Zyou_Market" 
                        class="w-full px-4 py-3 text-sm rounded-xl bg-slate-950 border border-blue-900 focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20 text-white placeholder-slate-600 outline-none transition-all"
                    />
                </div>
            </div>

            <!-- STEP 2: PILIH KATEGORI & PRODUK -->
            <div>
                <label class="block text-xs font-bold text-blue-300 uppercase tracking-wider mb-1.5">
                    2. Pilih Kategori & Produk
                </label>
                
                <!-- Filter Kategori Tabs -->
                <div class="flex gap-2 overflow-x-auto pb-2 mb-2 text-xs font-semibold custom-scroll">
                    <button type="button" onclick="filterKategori('all')" id="tab-all" class="px-3 py-1.5 rounded-lg bg-blue-600 text-white border border-blue-500 whitespace-nowrap">Semua</button>
                    <button type="button" onclick="filterKategori('Robux Kelipatan')" id="tab-rb-kelipatan" class="px-3 py-1.5 rounded-lg bg-slate-950 text-slate-400 border border-slate-800 whitespace-nowrap">Robux Kelipatan</button>
                    <button type="button" onclick="filterKategori('Robux Eceran')" id="tab-rb-eceran" class="px-3 py-1.5 rounded-lg bg-slate-950 text-slate-400 border border-slate-800 whitespace-nowrap">Robux Eceran</button>
                    <button type="button" onclick="filterKategori('DDS Uang')" id="tab-dds-uang" class="px-3 py-1.5 rounded-lg bg-slate-950 text-slate-400 border border-slate-800 whitespace-nowrap">DDS (Uang)</button>
                    <button type="button" onclick="filterKategori('DDS Gamepass')" id="tab-dds-gamepass" class="px-3 py-1.5 rounded-lg bg-slate-950 text-slate-400 border border-slate-800 whitespace-nowrap">DDS (Gamepass)</button>
                </div>

                <!-- Kotak List Produk -->
                <div class="grid grid-cols-2 gap-2 max-h-64 overflow-y-auto pr-1 custom-scroll" id="produkContainer">
                    <!-- Produk otomatis di-render oleh JS -->
                </div>
                
                <!-- Informasi Note khusus Robux / DDS -->
                <div id="noteBox" class="hidden mt-2 p-2.5 bg-blue-950/50 border border-blue-500/20 rounded-xl text-[11px] text-blue-300 leading-relaxed">
                    <span id="noteText"></span>
                </div>
            </div>

            <!-- STEP 3: PILIH METODE PEMBAYARAN -->
            <div>
                <label class="block text-xs font-bold text-blue-300 uppercase tracking-wider mb-1.5">
                    3. Pilih Rencana Pembayaran
                </label>
                <select 
                    id="paymentMethod"
                    required
                    class="w-full px-4 py-3 text-sm rounded-xl bg-slate-950 border border-blue-900 focus:border-blue-400 text-white outline-none transition-all cursor-pointer"
                >
                    <option value="" disabled selected>-- Pilih E-Wallet / Bank --</option>
                    <option value="DANA">DANA</option>
                    <option value="GOPAY">GOPAY</option>
                    <option value="OVO">OVO</option>
                    <option value="QRIS All Payment">QRIS All Payment</option>
                    <option value="Transfer Bank (BCA/Mandiri/BRI)">Transfer Bank (BCA / Mandiri / BRI)</option>
                </select>
            </div>

            <!-- TOMBOL BELI -->
            <button 
                type="submit" 
                class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white text-sm font-bold rounded-xl shadow-lg shadow-blue-500/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2"
            >
                <span>🚀 Kirim Orderan ke WhatsApp</span>
            </button>
        </form>

    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        // NOMOR WA AUTOMATIC DARI GAMBAR KAMU
        const NOMOR_WA_ADMIN = "6285836956238"; 

        // ALL PRICELIST DATA (ROBUX + DRAG DRIVE SIMULATOR)
        const DAFTAR_PRODUK = [
            // Robux Kelipatan
            { id: "rbk50", nama: "50 Robux", harga: "Rp 7.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk100", nama: "100 Robux", harga: "Rp 14.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk150", nama: "150 Robux", harga: "Rp 21.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk200", nama: "200 Robux", harga: "Rp 28.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk250", nama: "250 Robux", harga: "Rp 35.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk300", nama: "300 Robux", harga: "Rp 42.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk350", nama: "350 Robux", harga: "Rp 49.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk400", nama: "400 Robux", harga: "Rp 56.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk450", nama: "450 Robux", harga: "Rp 63.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk500", nama: "500 Robux", harga: "Rp 70.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk550", nama: "550 Robux", harga: "Rp 77.000", kategori: "Robux Kelipatan", icon: "🎮" },
            
            // Robux Eceran
            { id: "rbe10", nama: "10 Robux", harga: "Rp 1.400", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe20", nama: "20 Robux", harga: "Rp 2.800", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe30", nama: "30 Robux", harga: "Rp 4.200", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe40", nama: "40 Robux", harga: "Rp 5.600", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe50", nama: "50 Robux (Ecer)", harga: "Rp 7.000", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe60", nama: "60 Robux", harga: "Rp 8.400", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe70", nama: "70 Robux", harga: "Rp 9.800", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe80", nama: "80 Robux", harga: "Rp 11.200", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe90", nama: "90 Robux", harga: "Rp 12.600", kategori: "Robux Eceran", icon: "💎" },

            // DDS Uang
            { id: "ddsu500m", nama: "Uang Rp 500,000,000", harga: "Rp 34.500", kategori: "DDS Uang", icon: "💵" },
            { id: "ddsu100m", nama: "Uang Rp 100,000,000", harga: "Rp 9.000", kategori: "DDS Uang", icon: "💵" },
            { id: "ddsu50m", nama: "Uang Rp 50,000,000", harga: "Rp 5.500", kategori: "DDS Uang", icon: "💵" },
            { id: "ddsu10m", nama: "Uang Rp 10,000,000", harga: "Rp 3.500", kategori: "DDS Uang", icon: "💵" },
            { id: "ddsu5m", nama: "Uang Rp 5,000,000", harga: "Rp 2.000", kategori: "DDS Uang", icon: "💵" },
            { id: "ddsu1m", nama: "Uang Rp 1,000,000", harga: "Rp 1.000", kategori: "DDS Uang", icon: "💵" },

            // DDS Gamepass
            { id: "ddsgcustom", nama: "Custom Plate Pass", harga: "Rp 7.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgdrag", nama: "Dragspec Pass", harga: "Rp 10.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgaksesori", nama: "Aksesori Premium", harga: "Rp 5.500", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgroda", nama: "Roda Eksklusif", harga: "Rp 7.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgpolisi", nama: "Pass Polisi", harga: "Rp 13.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgslot", nama: "Pembuka Batas Slot", harga: "Rp 8.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsangkat", nama: "Pass Kat Kat Lanjutan", harga: "Rp 5.500", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsggaji", nama: "2X Cek Gaji", harga: "Rp 44.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgmewah", nama: "Pass Mewah", harga: "Rp 11.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgsuspensi", nama: "Pro Suspensi", harga: "Rp 3.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgboombox", nama: "Radio Boombox", harga: "Rp 3.000", kategori: "DDS Gamepass", icon: "🏎️" },
        ];

        let produkTerpilih = null;
        let kategoriAktif = 'all';

        function tampilkanProduk(filter = 'all') {
            const container = document.getElementById('produkContainer');
            container.innerHTML = '';

            DAFTAR_PRODUK.forEach(prod => {
                if (filter !== 'all' && prod.kategori !== filter) return;

                const card = document.createElement('div');
                card.id = prod.id;
                const isSelected = produkTerpilih?.id === prod.id;
                card.className = isSelected 
                    ? "border-2 border-blue-400 bg-blue-950/40 p-2.5 rounded-xl cursor-pointer shadow-md shadow-blue-500/10 transition-all text-left"
                    : "border border-blue-900/50 bg-slate-950/40 p-2.5 rounded-xl cursor-pointer hover:border-blue-500/40 transition-all text-left";
                
                card.innerHTML = `
                    <div class="text-[10px] text-blue-400 font-medium flex items-center gap-1">
                        <span>${prod.icon}</span> <span>${prod.kategori}</span>
                    </div>
                    <h3 class="text-xs font-bold text-white mt-0.5 line-clamp-2 leading-tight">${prod.nama}</h3>
                    <p class="text-xs font-extrabold text-blue-400 mt-1">${prod.harga}</p>
                `;
                
                card.onclick = () => pilihProduk(prod);
                container.appendChild(card);
            });
        }

        function pilihProduk(prod) {
            produkTerpilih = prod;
            tampilkanProduk(kategoriAktif);

            const noteBox = document.getElementById('noteBox');
            const noteText = document.getElementById('noteText');
            
            if (prod.kategori.includes('Robux')) {
                noteBox.classList.remove('hidden');
                noteText.innerHTML = "<strong>💡 Note Robux:</strong> Akun penerima harus 18+ & terverifikasi KTP (di bawah itu harus pakai parent ku, per send 1k). Digift dari acc pribadi, clean & fast!";
            } else if (prod.kategori.includes('DDS')) {
                noteBox.classList.remove('hidden');
                noteText.innerHTML = "<strong>🏎️ Note Drag Drive Simulator:</strong> Proses cepat via gift item in-game resmi. Pastikan Username & Display Name sudah sesuai!";
            } else {
                noteBox.classList.add('hidden');
            }
        }

        function filterKategori(kat) {
            kategoriAktif = kat;
            const tabs = ['all', 'rb-kelipatan', 'rb-eceran', 'dds-uang', 'dds-gamepass'];
            const namaKat = ['all', 'Robux Kelipatan', 'Robux Eceran', 'DDS Uang', 'DDS Gamepass'];
            
            tabs.forEach((tab, index) => {
                const el = document.getElementById(`tab-${tab}`);
                if (namaKat[index] === kat || tab === kat) {
                    el.className = "px-3 py-1.5 rounded-lg bg-blue-600 text-white border border-blue-500 whitespace-nowrap";
                } else {
                    el.className = "px-3 py-1.5 rounded-lg bg-slate-950 text-slate-400 border border-slate-800 whitespace-nowrap";
                }
            });

            tampilkanProduk(kat);
        }

        function kirimOrder(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const displayName = document.getElementById('displayName').value;
            const paymentMethod = document.getElementById('paymentMethod').value;

            if (!produkTerpilih) {
                alert("Pilih dulu produknya ya kak dengan cara mengkliknya!");
                return;
            }

            // Format Pesan Invoice Baru & Rapi
            const teksPesan = 
                `📢 *NEW ORDER - ZYOU MARKET* 📢\n` +
                `-----------------------------------------\n\n` +
                `📝 *DATA PESANAN*\n` +
                `| *Kategori*     : ${produkTerpilih.kategori}\n` +
                `| *Produk*       : ${produkTerpilih.nama}\n` +
                `| *Username*     : ${username}\n` +
                `| *Display Name* : ${displayName}\n\n` +
                `💳 *PEMBAYARAN*\n` +
                `| *Metode*       : ${paymentMethod}\n` +
                `| *Total*        : *${produkTerpilih.harga}*\n\n` +
                `-----------------------------------------\n` +
                `_Halo Admin Zyou Market, saya sudah mengisi data di website. Mohon instruksi selanjutnya untuk pembayaran ya, terima kasih!_`;

            const urlWhatsApp = `https://wa.me/${NOMOR_WA_ADMIN}?text=${encodeURIComponent(teksPesan)}`;
            window.open(urlWhatsApp, '_blank');
        }

        tampilkanProduk('all');
    </script>
</body>
</html>
