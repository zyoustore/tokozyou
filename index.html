<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Top Up Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-product {
            transition: all 0.3s ease;
        }
        .card-product:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans">

    <!-- Navbar -->
    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter">TOKOPRO</h1>
        <div class="space-x-6 text-sm font-medium">
            <a href="#" class="hover:text-blue-400">Home</a>
            <a href="#" class="hover:text-blue-400">Status</a>
        </div>
    </nav>

    <!-- Header -->
    <header class="text-center py-16 px-4">
        <h2 class="text-4xl md:text-5xl font-extrabold mb-4">Top Up Games Terpercaya</h2>
        <p class="text-slate-400">Solusi top up cepat, aman, dan harga bersahabat.</p>
    </header>

    <!-- Product Grid -->
    <main class="max-w-6xl mx-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-6">
        
        <!-- Kartu Produk 1 -->
        <div class="card-product bg-slate-900 p-4 rounded-2xl border border-slate-800">
            <img src="https://share.google/UL4gOL8CJ2JqsT5e2" class="rounded-xl mb-4 w-full h-32 object-cover">
            <h3 class="font-bold text-lg">Roblox</h3>
            <p class="text-blue-400 font-bold mt-1">Rp 15.000</p>
            <a href="#" class="block text-center mt-4 bg-blue-600 hover:bg-blue-500 py-2.5 rounded-xl font-bold transition">Beli</a>
        </div>

        <!-- Kartu Produk 2 -->
        <div class="card-product bg-slate-900 p-4 rounded-2xl border border-slate-800">
            <img src="https://share.google/dLeoWQcXb7NWjS9vQ" class="rounded-xl mb-4 w-full h-32 object-cover">
            <h3 class="font-bold text-lg">Mobile Legends</h3>
            <p class="text-blue-400 font-bold mt-1">Rp 20.000</p>
            <a href="#" class="block text-center mt-4 bg-blue-600 hover:bg-blue-500 py-2.5 rounded-xl font-bold transition">Beli</a>
        </div>

        <!-- Tambahkan lagi di bawah sini sesuai kebutuhan -->

    </main>

</body>
</html>
