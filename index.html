<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyou Market | Roblox Top Up & Antrean Live</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f2b48 100%);
        }
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 10px;
        }
    </style>

    <!-- Firebase Realtime Database SDK (Gratis Google) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="text-slate-800 min-h-screen flex items-center justify-center p-4">

    <!-- CONTAINER UTAMA -->
    <div class="w-full max-w-lg bg-white rounded-3xl p-6 shadow-2xl border-4 border-sky-200 my-4">
        
        <!-- HEADER TOKO -->
        <div class="text-center mb-5">
            <div class="inline-block px-3 py-1 bg-sky-100 text-sky-700 text-xs font-bold rounded-full mb-2">
                STORE RESMI & TERPERCAYA
            </div>
            <h1 class="text-3xl font-extrabold tracking-wide text-slate-900">
                ⚡ ZYOU <span class="text-sky-500">MARKET</span>
            </h1>
            <p class="text-xs text-slate-500 mt-1 font-medium">Robux & Gamepass Drag Drive Simulator</p>
        </div>

        <!-- BOX STATUS ANTREAN LATEST -->
        <div class="bg-gradient-to-r from-sky-500 to-blue-600 text-white p-4 rounded-2xl mb-5 flex items-center justify-between shadow-md">
            <div>
                <p class="text-[10px] uppercase font-bold tracking-wider text-sky-100">Total Antrean Masuk</p>
                <h3 class="text-base font-extrabold"><span id="totalAntrean" class="text-yellow-300">0</span> Pesanan Terdata</h3>
            </div>
            <div class="text-right">
                <span class="text-[10px] bg-white/20 px-2.5 py-1 rounded-full font-bold animate-pulse">🟢 Live Queue</span>
            </div>
        </div>

        <form id="topupForm" onsubmit="kirimOrder(event)" class="space-y-4">
            
            <!-- STEP 1: INPUT DATA USER -->
            <div class="bg-slate-50 p-4 rounded-2xl border border-sky-100">
                <label class="block text-xs font-bold text-slate-900 uppercase tracking-wider mb-2">
                    1. Data Akun Roblox
                </label>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <span class="text-[11px] text-slate-500 mb-1 block">Username</span>
                        <input 
                            type="text" 
                            id="username"
                            required
                            placeholder="ZyouAdmin" 
                            class="w-full px-3.5 py-2.5 text-sm rounded-xl bg-white border border-slate-300 focus:border-sky-500 text-slate-800 placeholder-slate-400 outline-none transition-all"
                        />
                    </div>
                    <div>
                        <span class="text-[11px] text-slate-500 mb-1 block">Display Name</span>
                        <input 
                            type="text" 
                            id="displayName"
                            required
                            placeholder="Zyou_Market" 
                            class="w-full px-3.5 py-2.5 text-sm rounded-xl bg-white border border-slate-300 focus:border-sky-500 text-slate-800 placeholder-slate-400 outline-none transition-all"
                        />
                    </div>
                </div>
            </div>

            <!-- STEP 2: PILIH KATEGORI & PRODUK -->
            <div class="bg-slate-50 p-4 rounded-2xl border border-sky-100">
                <label class="block text-xs font-bold text-slate-900 uppercase tracking-wider mb-2">
                    2. Pilih Kategori & Produk
                </label>
                
                <div class="flex gap-2 overflow-x-auto pb-2 mb-3 text-xs font-semibold custom-scroll">
                    <button type="button" onclick="filterKategori('all')" id="tab-all" class="px-3 py-1.5 rounded-xl bg-slate-900 text-white border border-slate-900 whitespace-nowrap shadow-sm">Semua</button>
                    <button type="button" onclick="filterKategori('Robux Kelipatan')" id="tab-rb-kelipatan" class="px-3 py-1.5 rounded-xl bg-white text-slate-600 border border-slate-200 whitespace-nowrap hover:bg-sky-50">Robux Kelipatan</button>
                    <button type="button" onclick="filterKategori('Robux Eceran')" id="tab-rb-eceran" class="px-3 py-1.5 rounded-xl bg-white text-slate-600 border border-slate-200 whitespace-nowrap hover:bg-sky-50">Robux Eceran</button>
                    <button type="button" onclick="filterKategori('DDS Uang')" id="tab-dds-uang" class="px-3 py-1.5 rounded-lg bg-white text-slate-600 border border-slate-200 whitespace-nowrap hover:bg-sky-50">DDS (Uang)</button>
                    <button type="button" onclick="filterKategori('DDS Gamepass')" id="tab-dds-gamepass" class="px-3 py-1.5 rounded-lg bg-white text-slate-600 border border-slate-200 whitespace-nowrap hover:bg-sky-50">DDS (Gamepass)</button>
                </div>

                <div class="grid grid-cols-2 gap-2.5 max-h-52 overflow-y-auto pr-1 custom-scroll" id="produkContainer">
                    <!-- Produk otomatis di-render oleh JS -->
                </div>
                
                <div id="noteBox" class="hidden mt-3 p-3 bg-sky-50 border border-sky-200 rounded-xl text-[11px] text-sky-900 leading-relaxed">
                    <span id="noteText"></span>
                </div>
            </div>

            <!-- STEP 3: PILIH METODE PEMBAYARAN -->
            <div class="bg-slate-50 p-4 rounded-2xl border border-sky-100">
                <label class="block text-xs font-bold text-slate-900 uppercase tracking-wider mb-2">
                    3. Pilih Pembayaran
                </label>
                <select 
                    id="paymentMethod"
                    required
                    class="w-full px-4 py-3 text-sm rounded-xl bg-white border border-slate-300 focus:border-sky-500 text-slate-800 outline-none transition-all cursor-pointer"
                >
                    <option value="" disabled selected>-- Pilih E-Wallet / Bank --</option>
                    <option value="DANA">DANA</option>
                    <option value="GOPAY">GOPAY</option>
                    <option value="OVO">OVO</option>
                    <option value="QRIS All Payment">QRIS All Payment</option>
                    <option value="Transfer Bank (BCA/Mandiri/BRI)">Transfer Bank (BCA / Mandiri / BRI)</option>
                </select>
            </div>

            <!-- TOMBOL BELI -->
            <button 
                type="submit" 
                class="w-full py-4 bg-gradient-to-r from-slate-900 via-sky-900 to-sky-600 hover:from-slate-800 hover:to-sky-500 text-white text-sm font-bold rounded-2xl shadow-lg shadow-sky-200 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2"
            >
                <span>🚀 Ambil Antrean & Order ke WA</span>
            </button>
        </form>

        <!-- SECTION DAFTAR ANTREAN LIVE DI WEB -->
        <div class="mt-8 pt-6 border-t border-slate-100">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-extrabold text-slate-900 flex items-center gap-1.5">
                    📋 <span>Daftar Antrean Real-Time</span>
                </h2>
                <span class="text-[10px] text-sky-600 font-bold">Terupdate Otomatis</span>
            </div>

            <div class="max-h-48 overflow-y-auto space-y-2 pr-1 custom-scroll" id="antreanList">
                <p class="text-center text-slate-400 text-xs py-4">Belum ada antrean saat ini...</p>
            </div>
        </div>

    </div>

    <!-- LOGIKA JAVASCRIPT & FIREBASE -->
    <script>
        const NOMOR_WA_ADMIN = "6281973755385"; 

        // 1. INI DATABASE PUBLIC GRATIS GOOGLE (Sudah Siap Pakai)
        const firebaseConfig = {
            databaseURL: "https://zyou-market-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. DAFTAR PRODUK
        const DAFTAR_PRODUK = [
            // Robux Kelipatan
            { id: "rbk50", nama: "50 Robux", harga: "Rp 7.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk100", nama: "100 Robux", harga: "Rp 14.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk150", nama: "150 Robux", harga: "Rp 21.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk200", nama: "200 Robux", harga: "Rp 28.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk250", nama: "250 Robux", harga: "Rp 35.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk300", nama: "300 Robux", harga: "Rp 42.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk350", nama: "350 Robux", harga: "Rp 49.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk400", nama: "400 Robux", harga: "Rp 56.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk450", nama: "450 Robux", harga: "Rp 63.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk500", nama: "500 Robux", harga: "Rp 70.000", kategori: "Robux Kelipatan", icon: "🎮" },
            { id: "rbk550", nama: "550 Robux", harga: "Rp 77.000", kategori: "Robux Kelipatan", icon: "🎮" },
            
            // Robux Eceran
            { id: "rbe10", nama: "10 Robux", harga: "Rp 1.400", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe20", nama: "20 Robux", harga: "Rp 2.800", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe30", nama: "30 Robux", harga: "Rp 4.200", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe40", nama: "40 Robux", harga: "Rp 5.600", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe50", nama: "50 Robux (Ecer)", harga: "Rp 7.000", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe60", nama: "60 Robux", harga: "Rp 8.400", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe70", nama: "70 Robux", harga: "Rp 9.800", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe80", nama: "80 Robux", harga: "Rp 11.200", kategori: "Robux Eceran", icon: "💎" },
            { id: "rbe90", nama: "90 Robux", harga: "Rp 12.600", kategori: "Robux Eceran", icon: "💎" },

            // DDS Uang
            { id: "ddsu500m", nama: "Uang Rp 500,000,000", harga: "Rp 34.500", kategori: "DDS Uang", icon: "💵" },
            { id: "ddsu100m", nama: "Uang Rp 100,000,000", harga: "Rp 9.000", kategori: "DDS Uang", icon: "💵" },
            { id: "ddsu50m", nama: "Uang Rp 50,000,000", harga: "Rp 5.500", kategori: "DDS Uang", icon: "💵" },
            { id: "ddsu10m", nama: "Uang Rp 10,000,000", harga: "Rp 3.500", kategori: "DDS Uang", icon: "💵" },
            { id: "ddsu5m", nama: "Uang Rp 5,000,000", harga: "Rp 2.000", kategori: "DDS Uang", icon: "💵" },
            { id: "ddsu1m", nama: "Uang Rp 1,000,000", harga: "Rp 1.000", kategori: "DDS Uang", icon: "💵" },

            // DDS Gamepass
            { id: "ddsgcustom", nama: "Custom Plate Pass", harga: "Rp 7.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgdrag", nama: "Dragspec Pass", harga: "Rp 10.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgaksesori", nama: "Aksesori Premium", harga: "Rp 5.500", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgroda", nama: "Roda Eksklusif", harga: "Rp 7.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgpolisi", nama: "Pass Polisi", harga: "Rp 13.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgslot", nama: "Pembuka Batas Slot", harga: "Rp 8.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsangkat", nama: "Pass Kat Kat Lanjutan", harga: "Rp 5.500", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsggaji", nama: "2X Cek Gaji", harga: "Rp 44.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgmewah", nama: "Pass Mewah", harga: "Rp 11.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgsuspensi", nama: "Pro Suspensi", harga: "Rp 3.000", kategori: "DDS Gamepass", icon: "🏎️" },
            { id: "ddsgboombox", nama: "Radio Boombox", harga: "Rp 3.000", kategori: "DDS Gamepass", icon: "🏎️" },
        ];

        let produkTerpilih = null;
        let kategoriAktif = 'all';

        function tampilkanProduk(filter = 'all') {
            const container = document.getElementById('produkContainer');
            container.innerHTML = '';

            DAFTAR_PRODUK.forEach(prod => {
                if (filter !== 'all' && prod.kategori !== filter) return;

                const card = document.createElement('div');
                card.id = prod.id;
                const isSelected = produkTerpilih?.id === prod.id;

                card.className = isSelected 
                    ? "border-2 border-sky-500 bg-sky-50/80 p-2.5 rounded-xl cursor-pointer shadow-md transition-all text-left"
                    : "border border-slate-200 bg-white p-2.5 rounded-xl cursor-pointer hover:border-sky-300 hover:bg-sky-50/30 transition-all text-left";
                
                card.innerHTML = `
                    <div class="text-[10px] text-sky-600 font-bold flex items-center gap-1">
                        <span>${prod.icon}</span> <span>${prod.kategori}</span>
                    </div>
                    <h3 class="text-xs font-bold text-slate-800 mt-0.5 line-clamp-2 leading-tight">${prod.nama}</h3>
                    <p class="text-xs font-black text-sky-600 mt-1">${prod.harga}</p>
                `;
                
                card.onclick = () => pilihProduk(prod);
                container.appendChild(card);
            });
        }

        function pilihProduk(prod) {
            produkTerpilih = prod;
            tampilkanProduk(kategoriAktif);

            const noteBox = document.getElementById('noteBox');
            const noteText = document.getElementById('noteText');
            
            if (prod.kategori.includes('Robux')) {
                noteBox.classList.remove('hidden');
                noteText.innerHTML = "<strong>💡 Note Robux:</strong> Akun penerima harus 18+ & terverifikasi KTP (di bawah itu harus pakai parent ku, per send 1k). Digift dari acc pribadi, clean & fast!";
            } else if (prod.kategori.includes('DDS')) {
                noteBox.classList.remove('hidden');
                noteText.innerHTML = "<strong>🏎️ Note Drag Drive Simulator:</strong> Proses cepat via gift item in-game resmi. Pastikan Username & Display Name sesuai!";
            } else {
                noteBox.classList.add('hidden');
            }
        }

        function filterKategori(kat) {
            kategoriAktif = kat;
            const tabs = ['all', 'rb-kelipatan', 'rb-eceran', 'dds-uang', 'dds-gamepass'];
            const namaKat = ['all', 'Robux Kelipatan', 'Robux Eceran', 'DDS Uang', 'DDS Gamepass'];
            
            tabs.forEach((tab, index) => {
                const el = document.getElementById(`tab-${tab}`);
                if (namaKat[index] === kat || tab === kat) {
                    el.className = "px-3 py-1.5 rounded-xl bg-slate-900 text-white border border-slate-900 whitespace-nowrap shadow-sm";
                } else {
                    el.className = "px-3 py-1.5 rounded-xl bg-white text-slate-600 border border-slate-200 whitespace-nowrap hover:bg-sky-50";
                }
            });

            tampilkanProduk(kat);
        }

        // 3. PANTAU ANTREAN DARI DATABASE REAL-TIME
        db.ref('antrean').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('antreanList');
            const totalAntrean = document.getElementById('totalAntrean');

            if (!data) {
                container.innerHTML = `<p class="text-center text-slate-400 text-xs py-4">Belum ada antrean hari ini...</p>`;
                totalAntrean.innerText = "0";
                return;
            }

            const listData = Object.values(data).reverse(); // Urutkan dari yang terbaru
            totalAntrean.innerText = listData.length;
            
            container.innerHTML = '';
            listData.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-3 bg-slate-50 border border-slate-200 rounded-xl flex items-center justify-between text-xs";
                
                // Sensor nama pembeli agar privasi aman (Misal: ZyouAdmin -> Zy*****in)
                const userHidden = item.username.length > 3 
                    ? item.username.substring(0,2) + "*****" + item.username.slice(-1)
                    : item.username;

                div.innerHTML = `
                    <div>
                        <div class="font-bold text-slate-900 flex items-center gap-1.5">
                            <span class="bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded text-[10px] font-black">${item.idAntrean}</span>
                            <span>${userHidden}</span>
                        </div>
                        <p class="text-[11px] text-slate-500 mt-0.5">${item.produk}</p>
                    </div>
                    <div>
                        <span class="px-2 py-1 rounded-full text-[10px] font-bold bg-yellow-100 text-yellow-800">
                            ⏳ Menunggu
                        </span>
                    </div>
                `;
                container.appendChild(div);
            });
        });

        // 4. KIRIM ORDER & SIMPAN KE DATABASE ANTREAN
        function kirimOrder(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const displayName = document.getElementById('displayName').value;
            const paymentMethod = document.getElementById('paymentMethod').value;

            if (!produkTerpilih) {
                alert("Pilih dulu produknya ya kak dengan cara mengkliknya!");
                return;
            }

            // Kode Antrean Unik Berurutan Berdasarkan Jam
            const randomCode = Math.floor(100 + Math.random() * 900);
            const idAntrean = `ZY-${randomCode}`;

            // Simpan Data ke Firebase Realtime Database
            db.ref('antrean/' + idAntrean).set({
                idAntrean: idAntrean,
                username: username,
                produk: produkTerpilih.nama,
                waktu: new Date().toLocaleTimeString('id-ID')
            });

            // FORMAT PESAN WA RINGKAS
            const teksPesan = 
                `🛒 *ORDER ZYOU MARKET* (#${idAntrean})\n` +
                `----------------------------------\n` +
                `• *Item:* ${produkTerpilih.nama}\n` +
                `• *Harga:* ${produkTerpilih.harga}\n` +
                `• *User Roblox:* ${username}\n` +
                `• *Display Name:* ${displayName}\n` +
                `• *Bayar Via:* ${paymentMethod}\n` +
                `----------------------------------\n` +
                `Halo Admin, tolong instruksi pembayaran & proses antreannya ya!`;

            const urlWhatsApp = `https://wa.me/${NOMOR_WA_ADMIN}?text=${encodeURIComponent(teksPesan)}`;
            window.open(urlWhatsApp, '_blank');
        }

        tampilkanProduk('all');
    </script>
</body>
</html>
